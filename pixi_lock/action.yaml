name: Pixi lock
description: Get or create the pixi.lock
inputs:
  cache:
    description: Whether to enable caching of the lock-file
    required: true
    default: "true"
  pixi-version:
    description: The version of pixi to use
    required: false
  pixi-manifest-path:
    description: The path to the pixi manifest file
    required: false

runs:
  using: "composite"
  steps:
    - name: Set TODAY
      id: set-today
      shell: bash -e {0}
      run: |
        echo "TODAY=$(command date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    - uses: actions/checkout@v6
      with:
        fetch-depth: "1"
        persist-credentials: false
    - if: inputs.cache == 'true'
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: pixi.lock
        key: pixi|${{ steps.set-today.outputs.TODAY }}|${{ hashFiles('pixi.toml') }}
    - uses: prefix-dev/setup-pixi@v0.9.5
      if: steps.cache.outputs.cache-hit != 'true'
      with:
        pixi-version: ${{ inputs.pixi-version }}
        manifest-path: ${{ inputs.pixi-manifest-path }}
        run-install: false
    - name: Lock
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash -e {0}
      run: |
        echo "::group::Lock"
        pixi lock --color=always
        echo "::endgroup::"
    - uses: actions/upload-artifact@v7
      with:
        name: pixi-lock
        path: pixi.lock
        if-no-files-found: error
    - if: inputs.cache == 'true' && steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: pixi.lock
        key: pixi|${{ steps.set-today.outputs.TODAY }}|${{ hashFiles('pixi.toml') }}
