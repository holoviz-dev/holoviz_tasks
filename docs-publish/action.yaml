name: Docs publish
description: Publish docs to AWS
inputs:
  url:
    description: The URL to the S3 bucket, no trailing slash
    required: true
  cloudfront_id:
    description: The cloudfront id
    required: true
  path:
    description: The folder to upload
    default: ./builtdocs/

runs:
  using: "composite"
  steps:
    - shell: bash -e {0}
      id: vars
      run: |
        echo "Deploying from ref ${GITHUB_REF#refs/*/}"
        echo "tag=${GITHUB_REF#refs/*/}" > $GITHUB_OUTPUT
    - name: upload dev
      shell: bash -e {0}
      if: |
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev') ||
        (github.event_name == 'push' && (contains(steps.vars.outputs.tag, 'a') || contains(steps.vars.outputs.tag, 'b') || contains(steps.vars.outputs.tag, 'rc')))
      run: |
        echo "::group::aws sync (dev)"
        aws s3 sync --delete "${{ inputs.path }}" "${{ inputs.url }}/en/docs/dev"
        echo "::endgroup::"
    - name: upload main
      shell: bash -e {0}
      if: |
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'main') ||
        (github.event_name == 'push' && !(contains(steps.vars.outputs.tag, 'a') || contains(steps.vars.outputs.tag, 'b') || contains(steps.vars.outputs.tag, 'rc')))
      run: |
        echo "::group::aws sync (main)"
        echo "MAIN"
        # aws s3 sync --delete --dryrun "${{ inputs.path }}" "${{ inputs.url }}/en/docs/latest"
        # aws s3 sync --delete --dryrun "${{ inputs.path }}" "${{ inputs.url }}/en/docs/${{ steps.vars.output.tag }}"
        echo "::endgroup::"
    - name: dryrun
      shell: bash -e {0}
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dryrun'
      run: |
        echo "::group::aws sync (dryrun)"
        aws s3 sync --delete --dryrun "${{ inputs.path }}" "${{ inputs.url }}/en/docs/latest"
        echo "::endgroup::"
